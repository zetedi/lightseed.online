<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Mahameru — the sea of creation: a starry sky holding Orion, unlinked — the sea of possibility">
  <defs>
    <radialGradient id="sky" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="55%" stop-color="#081226"/>
      <stop offset="100%" stop-color="#04070f"/>
    </radialGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c86e8a" stop-opacity="0.5"/>
      <stop offset="45%" stop-color="#7e5aa8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7e5aa8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="softer" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Night -->
  <rect width="800" height="800" fill="url(#sky)"/>

  <!-- Field of background stars -->
  <g fill="#dbe7ff">
    <circle cx="46" cy="72" r="1.1" opacity="0.7"/><circle cx="118" cy="41" r="0.8" opacity="0.5"/>
    <circle cx="187" cy="118" r="1.3" opacity="0.8"/><circle cx="243" cy="66" r="0.7" opacity="0.45"/>
    <circle cx="322" cy="34" r="1" opacity="0.6"/><circle cx="401" cy="76" r="0.8" opacity="0.5"/>
    <circle cx="468" cy="49" r="1.2" opacity="0.75"/><circle cx="540" cy="90" r="0.7" opacity="0.4"/>
    <circle cx="617" cy="52" r="1" opacity="0.65"/><circle cx="694" cy="97" r="1.3" opacity="0.8"/>
    <circle cx="751" cy="60" r="0.8" opacity="0.5"/><circle cx="73" cy="176" r="0.9" opacity="0.55"/>
    <circle cx="150" cy="228" r="1.1" opacity="0.7"/><circle cx="61" cy="305" r="0.7" opacity="0.4"/>
    <circle cx="129" cy="371" r="1.2" opacity="0.7"/><circle cx="88" cy="452" r="0.9" opacity="0.5"/>
    <circle cx="166" cy="512" r="1" opacity="0.6"/><circle cx="72" cy="581" r="1.2" opacity="0.7"/>
    <circle cx="205" cy="313" r="0.8" opacity="0.45"/><circle cx="246" cy="180" r="1" opacity="0.6"/>
    <circle cx="611" cy="171" r="1.1" opacity="0.7"/><circle cx="676" cy="238" r="0.8" opacity="0.5"/>
    <circle cx="736" cy="177" r="1" opacity="0.6"/><circle cx="716" cy="320" r="1.2" opacity="0.75"/>
    <circle cx="653" cy="395" r="0.8" opacity="0.45"/><circle cx="741" cy="447" r="1" opacity="0.6"/>
    <circle cx="686" cy="524" r="1.1" opacity="0.65"/><circle cx="618" cy="286" r="0.7" opacity="0.4"/>
    <circle cx="264" cy="264" r="0.9" opacity="0.55"/><circle cx="496" cy="141" r="1" opacity="0.6"/>
    <circle cx="576" cy="497" r="0.9" opacity="0.5"/><circle cx="238" cy="557" r="1" opacity="0.6"/>
    <circle cx="474" cy="561" r="0.8" opacity="0.45"/><circle cx="303" cy="118" r="0.8" opacity="0.5"/>
    <circle cx="360" cy="200" r="0.7" opacity="0.4"/><circle cx="497" cy="300" r="0.8" opacity="0.45"/>
    <circle cx="288" cy="356" r="0.7" opacity="0.4"/><circle cx="522" cy="447" r="0.9" opacity="0.5"/>
    <circle cx="437" cy="238" r="0.7" opacity="0.45"/><circle cx="573" cy="352" r="0.8" opacity="0.5"/>
    <circle cx="140" cy="88" r="0.7" opacity="0.45"/><circle cx="770" cy="390" r="0.8" opacity="0.5"/>
    <circle cx="30" cy="238" r="0.9" opacity="0.5"/><circle cx="762" cy="530" r="0.9" opacity="0.55"/>
  </g>


  <!-- The Great Nebula (M42), below the belt, in the sword -->
  <ellipse cx="392" cy="497" rx="34" ry="26" fill="url(#nebula)" filter="url(#softer)"/>
  <g fill="#e8f1ff">
    <circle cx="396" cy="470" r="1.6" opacity="0.85"/>
    <circle cx="392" cy="497" r="1.8" opacity="0.9"/>
    <circle cx="387" cy="526" r="1.5" opacity="0.8"/>
  </g>

  <!-- The seven lights of Orion -->
  <!-- Meissa — the head -->
  <circle cx="420" cy="152" r="2.6" fill="#dbe7ff" opacity="0.9"/>
  <!-- Betelgeuse — the red shoulder -->
  <circle cx="316" cy="232" r="9" fill="#ff9d6b" opacity="0.35" filter="url(#soft)"/>
  <circle cx="316" cy="232" r="5" fill="#ffb98a"/>
  <!-- Bellatrix -->
  <circle cx="528" cy="218" r="6" fill="#cfe0ff" opacity="0.35" filter="url(#soft)"/>
  <circle cx="528" cy="218" r="3.6" fill="#dbe9ff"/>
  <!-- The Belt: Alnitak · Alnilam · Mintaka -->
  <g>
    <circle cx="354" cy="428" r="6" fill="#dceaff" opacity="0.4" filter="url(#soft)"/>
    <circle cx="354" cy="428" r="3.6" fill="#eef5ff"/>
    <circle cx="401" cy="415" r="6" fill="#dceaff" opacity="0.4" filter="url(#soft)"/>
    <circle cx="401" cy="415" r="3.8" fill="#f2f7ff"/>
    <circle cx="448" cy="402" r="6" fill="#dceaff" opacity="0.4" filter="url(#soft)"/>
    <circle cx="448" cy="402" r="3.4" fill="#eef5ff"/>
  </g>
  <!-- Saiph -->
  <circle cx="332" cy="618" r="5.4" fill="#cfe0ff" opacity="0.3" filter="url(#soft)"/>
  <circle cx="332" cy="618" r="3.2" fill="#dbe9ff"/>
  <!-- Rigel — the blue foot -->
  <circle cx="524" cy="636" r="9" fill="#9ec4ff" opacity="0.4" filter="url(#soft)"/>
  <circle cx="524" cy="636" r="5" fill="#cfe3ff"/>

</svg>
