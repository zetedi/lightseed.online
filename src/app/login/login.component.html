<div id="login-container">
    <form>
        <p id="login-message">The name and the GPS coordinates of your <b>lifetree</b></p>
        <div id="login-form">
            <input type="text" id="name" value="" placeholder="Name" required><br />
            <input type="text" id="gps-lat" value="" placeholder="Latitude" required><br />
            <input type="text" id="gps-lon" value="" placeholder="Longitude" required><br />
            <a routerLink="/lifetrees"><input type="submit" value="Login"></a>
        </div>
    </form>
</div>
