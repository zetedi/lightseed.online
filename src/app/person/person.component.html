<div class="home-container">

    <div class="card" style="width: 18rem;" *ngFor="let user of users">
        <img class="card-img-top" src="https://placeimg.com/640/480/nature" alt="Card image cap">
        <div class="card-body">
            <h5 class="card-title">{{user.username}}</h5>
            <p class="card-text">Some quick example text to build on the card title and make up the bulk of the
                card's content.</p>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">First name: {{user.firstName}}</li>
            <li class="list-group-item">Last name: {{user.lastName}}</li>
        </ul>
        <div class="card-body">
            <a href="#" class="card-link">Details</a>
            <a href="#"  class="card-link" data-toggle="modal" data-target="#modal">
                Delete Modal
            </a>
            <!-- <a (click)="deleteUser(user.id)" class="text-danger">Delete</a> -->
        </div>
    </div>

</div>

<div class="modal fade" id="modal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete the user?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary">Delete</button>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
